services:
  image-server:
    build: .
    image: ghcr.io/amber-bisht/imageservcies-bun:latest
    container_name: image-server
    restart: always
    ports:
      - "4000:4000"
    volumes:
      - ./data/images:/app/public/images
    environment:
      - PORT=4000
      - IMAGE_SERVER_SECRET=${IMAGE_SERVER_SECRET}
      - BASE_URL=${BASE_URL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
